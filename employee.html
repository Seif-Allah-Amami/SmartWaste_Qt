<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Information</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 255, 156, 0.2);
            padding: 40px;
            max-width: 500px;
            width: 100%;
            border: 2px solid #00ff9c;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 2px solid #00ff9c;
            padding-bottom: 20px;
        }
        
        .header h1 {
            color: #0a0e27;
            font-size: 28px;
            margin-bottom: 10px;
        }
        
        .header p {
            color: #666;
            font-size: 12px;
        }
        
        .info-section {
            display: grid;
            gap: 20px;
        }
        
        .info-item {
            display: flex;
            flex-direction: column;
        }
        
        .info-label {
            color: #00ff9c;
            font-weight: 600;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }
        
        .info-value {
            color: #0a0e27;
            font-size: 16px;
            font-weight: 500;
            padding: 10px;
            background: rgba(0, 255, 156, 0.1);
            border-radius: 5px;
            border-left: 3px solid #00ff9c;
            padding-left: 15px;
        }
        
        .error {
            background: #ff6666;
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            margin-top: 20px;
        }
        
        .footer {
            text-align: center;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #ddd;
            font-size: 12px;
            color: #999;
        }
        
        @media (max-width: 480px) {
            .container {
                padding: 25px;
            }
            
            .header h1 {
                font-size: 22px;
            }
            
            .info-value {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Employee Information</h1>
            <p>Scanned from QR Code</p>
        </div>
        
        <div id="content"></div>
        
        <div class="footer">
            <p>© ReGen Management System</p>
        </div>
    </div>
    
    <script>
        // Get URL parameters
        function getUrlParameter(name) {
            name = name.replace(/[\[]/, '\\[').replace(/[\]]/, '\\]');
            var regex = new RegExp('[\\?&]' + name + '=([^&#]*)');
            var results = regex.exec(location.search);
            return results === null ? '' : decodeURIComponent(results[1].replace(/\+/g, ' '));
        }
        
        // Extract employee data from URL
        const id = getUrlParameter('id');
        const name = getUrlParameter('name');
        const email = getUrlParameter('email');
        const position = getUrlParameter('position');
        const department = getUrlParameter('department');
        const hiredate = getUrlParameter('hiredate');
        const salary = getUrlParameter('salary');
        
        const contentDiv = document.getElementById('content');
        
        if (id && name) {
            // Display employee information
            contentDiv.innerHTML = `
                <div class="info-section">
                    <div class="info-item">
                        <div class="info-label">Employee ID</div>
                        <div class="info-value">${id}</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">Full Name</div>
                        <div class="info-value">${name}</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">Email</div>
                        <div class="info-value">${email || 'N/A'}</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">Position</div>
                        <div class="info-value">${position || 'N/A'}</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">Department</div>
                        <div class="info-value">${department || 'N/A'}</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">Hire Date</div>
                        <div class="info-value">${hiredate || 'N/A'}</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">Salary</div>
                        <div class="info-value">${salary || 'N/A'}</div>
                    </div>
                </div>
            `;
        } else {
            // Show error if no data found
            contentDiv.innerHTML = `
                <div class="error">
                    <p>No employee data found in QR code.</p>
                    <p style="font-size: 11px; margin-top: 10px;">Please scan a valid employee QR code.</p>
                </div>
            `;
        }
    </script>
</body>
</html>
